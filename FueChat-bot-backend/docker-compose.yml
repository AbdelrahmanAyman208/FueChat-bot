version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fuebot_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: fuebot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./fuebot-backend/db/FueBot.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fuebot_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  python-ai:
    build: .
    container_name: fuebot_python
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL}
      - API_HOST=0.0.0.0
    volumes:
      - ./data:/app/data
      - ./vectorstore:/app/vectorstore
    depends_on:
      - redis

  node-api:
    build: ./fuebot-backend
    container_name: fuebot_node
    ports:
      - "5000:5000"
    environment:
      - POSTGRES_URL=postgresql://postgres:password123@postgres:5432/fuebot
      - PORT=5000
      - JWT_SECRET=supersecret123
      - AI_SERVICE_URL=http://python-ai:8000
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  react-ui:
    build: ../frontend/frontend
    container_name: fuebot_react
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - node-api

volumes:
  pgdata:
